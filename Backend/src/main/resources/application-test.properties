# Desactiva la carga de variables de entorno desde .env para las pruebas
spring.dotenv.enabled=false

# Configuraciµn de la base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuraciµn de JPA para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Valores ficticios para los servicios externos
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.auto-startup=false

# Configuraciµn de Redis para pruebas (valores ficticios)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none

# Configuraciµn de JWT para pruebas
JWT_SECRET_KEY=test_jwt_secret_key_for_testing_purposes_only_very_long_string
jwt.secretKey=test_jwt_secret_key_for_testing_purposes_only_very_long_string
jwt.expiration=86400000